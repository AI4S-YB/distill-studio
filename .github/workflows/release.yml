name: release

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install frontend dependencies
        run: npm ci

      - name: TypeScript type check (informational, not blocking)
        continue-on-error: true
        run: npx tsc --noEmit

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust clippy (informational, not blocking)
        continue-on-error: true
        run: cargo clippy --manifest-path src-tauri/Cargo.toml

  build-tauri:
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            artifact_name: macos
          - runner: windows-latest
            artifact_name: windows
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm ci

      - name: write release tauri config
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        run: node scripts/write-tauri-release-config.mjs

      - name: build release bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        run: npm run tauri:build:release

      - name: stage release artifacts
        run: node scripts/stage-release-artifacts.mjs ${{ matrix.artifact_name }}

      - name: upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: dist/release-artifacts/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-downloads

      - name: assemble release assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/assemble-release-assets.mjs dist/release-downloads dist/release-publish

      - name: recreate draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --json isDraft >/tmp/release.json 2>/dev/null; then
            if node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync("/tmp/release.json","utf8")); process.exit(data.isDraft ? 0 : 1)'; then
              gh release delete "$TAG" --yes
            else
              echo "Release $TAG already exists and is not a draft."
              exit 1
            fi
          fi
          gh release create "$TAG" \
            --draft \
            --title "Distill Studio v${TAG#app-v}" \
            --notes "Download the installer assets to install or update Distill Studio."

      - name: upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" dist/release-publish/* --clobber

      - name: publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false --latest
